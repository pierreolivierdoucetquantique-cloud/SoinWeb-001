<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Pierre-Olivier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <a href="index.html" class="brand">
    <span class="brand__mark">✦</span>
    <span class="brand__name">Pierre-Olivier</span>
  </a>
  <nav class="main-nav" aria-label="Navigation principale">
  </nav>
  <div class="header-actions">
    <a href="inscription.html" class="btn btn--gold">Créer un compte</a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Ouvrir le menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<nav class="mobile-nav" id="mobile-nav" aria-label="Navigation mobile">
  <a href="inscription.html" class="mobile-nav__cta">Créer un compte</a>
</nav>

<main class="auth">
  <div class="auth__panel">
    <p class="auth__eyebrow">Bon retour</p>
    <h1 class="auth__title">Connexion</h1>
    <p class="auth__sub" id="redirect-note">Accédez à votre espace personnel</p>

    <div class="auth__notice" id="form-notice" hidden></div>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
        <span class="field__error" id="err-email"></span>
      </div>

      <div class="field field--password">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
        <button type="button" class="field__toggle" data-toggle-for="password">Afficher</button>
        <span class="field__error" id="err-password"></span>
      </div>

      <p style="text-align:right; margin:-6px 0 22px;">
        <a href="mot-de-passe-oublie.html" style="font-size:.84rem; color:var(--gold-soft);">Mot de passe oublié ?</a>
      </p>

      <button type="submit" class="auth__submit">Se connecter</button>
    </form>

    <p class="auth__foot" style="margin-top:24px;">
      Pas encore de compte ? <a href="inscription.html">Créer un compte</a>
    </p>
  </div>
</main>

<script src="script.js"></script>
<script src="auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const form   = document.getElementById('login-form');
  const notice = document.getElementById('form-notice');

  // Affiche un contexte si l'utilisateur vient d'une page de service
  const params = new URLSearchParams(window.location.search);
  const redirect = params.get('redirect');
  const labels = {
    'services-energetiques': 'Soins Énergétiques',
    'soins-direct': 'Soins Direct',
    'accompagnement': 'Accompagnement 1:1'
  };
  if (redirect && labels[redirect]) {
    document.getElementById('redirect-note').textContent =
      `Connectez-vous pour réserver : ${labels[redirect]}`;
  }

  document.querySelectorAll('[data-toggle-for]').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.toggleFor);
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      btn.textContent = showing ? 'Afficher' : 'Masquer';
    });
  });

  function setError(field, msg) {
    const el = document.getElementById('err-' + field);
    const input = document.getElementById(field);
    if (el) el.textContent = msg || '';
    if (input) input.classList.toggle('has-error', Boolean(msg));
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    setError('email', ''); setError('password', '');
    notice.hidden = true;

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    let hasError = false;
    if (!email) { setError('email', 'Champ requis.'); hasError = true; }
    if (!password) { setError('password', 'Champ requis.'); hasError = true; }
    if (hasError) return;

    const result = PO_Auth.login({ email, password });
    if (!result.ok) {
      notice.hidden = false;
      notice.dataset.tone = 'error';
      notice.textContent = result.error;
      return;
    }

    notice.hidden = false;
    notice.dataset.tone = 'success';
    notice.textContent = 'Connexion réussie. Redirection...';
    const destination = PO_Auth.isAdmin() ? 'admin.html' : 'profil.html';
    setTimeout(() => { window.location.href = destination; }, 600);
  });
});
</script>
</body>
</html>
