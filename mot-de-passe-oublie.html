<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mot de passe oublié — Pierre-Olivier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <a href="index.html" class="brand">
    <span class="brand__mark">✦</span>
    <span class="brand__name">Pierre-Olivier</span>
  </a>
  <nav class="main-nav" aria-label="Navigation principale">
  </nav>
  <div class="header-actions">
    <a href="index.html" class="btn btn--ghost">← Retour à l'accueil</a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Ouvrir le menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<nav class="mobile-nav" id="mobile-nav" aria-label="Navigation mobile">
  <a href="index.html">← Retour à l'accueil</a>
</nav>

<main class="auth">
  <div class="auth__panel">
    <p class="auth__eyebrow">Réinitialisation</p>
    <h1 class="auth__title">Mot de passe oublié</h1>
    <p class="auth__sub">Recevez un lien de réinitialisation par email</p>

    <div class="auth__notice" id="form-notice" hidden></div>

    <form id="reset-form" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
        <span class="field__error" id="err-email"></span>
      </div>

      <button type="submit" class="auth__submit">Envoyer le lien</button>
    </form>

    <p class="auth__foot" style="margin-top:24px;">
      <a href="connexion.html">← Retour à la connexion</a>
    </p>
  </div>
</main>

<script src="script.js"></script>
<script src="auth.js"></script>
<script src="notifications-store.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const form   = document.getElementById('reset-form');
  const notice = document.getElementById('form-notice');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const errEl = document.getElementById('err-email');
    const input = document.getElementById('email');
    errEl.textContent = '';
    input.classList.remove('has-error');
    notice.hidden = true;

    const email = input.value.trim();
    if (!email || !email.includes('@')) {
      errEl.textContent = 'Email invalide.';
      input.classList.add('has-error');
      return;
    }

    const resetResult = PO_Auth.requestPasswordReset(email);

    if (resetResult.exists && typeof PO_Notifications !== 'undefined') {
      PO_Notifications.logEmail({
        type: 'password_reset',
        to: email,
        subject: 'Réinitialisation de votre mot de passe',
        body: `Bonjour,\n\nUne demande de réinitialisation de mot de passe a été effectuée pour votre compte. Si vous n'êtes pas à l'origine de cette demande, vous pouvez ignorer cet email.\n\n[Lien de réinitialisation simulé]`
      });
    }

    // Message volontairement identique que le compte existe ou non (sécurité)
    notice.hidden = false;
    notice.dataset.tone = 'success';
    notice.textContent = "Si un compte existe avec cet email, un lien de réinitialisation vient d'être envoyé.";
    form.querySelector('button').disabled = true;
  });
});
</script>
</body>
</html>
