# ============================================================
# render.yaml — Configuration Render.com (site statique)
# ============================================================
services:
  - type: web
    name: ntabou-aka-we
    env: static
    buildCommand: ""
    staticPublishPath: .
    headers:
      - path: "/*.html"
        name: Cache-Control
        value: "public, max-age=0, must-revalidate"
      - path: "/*.js"
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
      - path: "/*.css"
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
      - path: "/*.jpg"
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
    routes:
      - type: rewrite
        source: /admin
        destination: /admin.html
      - type: rewrite
        source: /profil
        destination: /profil.html
      - type: rewrite
        source: /connexion
        destination: /connexion.html
      - type: rewrite
        source: /inscription
        destination: /inscription.html
      - type: rewrite
        source: /*
        destination: /index.html
